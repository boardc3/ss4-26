<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sceneset.AI — Visualization for High-End Development</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="placeholder.jsx"></script>
<script type="text/babel" src="chrome.jsx"></script>
<script type="text/babel" src="page-home.jsx"></script>
<script type="text/babel" src="page-commercial-residential.jsx"></script>
<script type="text/babel" src="pages-rest.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentHue": 46,
  "denseHeader": false,
  "deepMode": false
}/*EDITMODE-END*/;

const App = () => {
  const [page, setPage] = React.useState('home');
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => { window.scrollTo({ top: 0, behavior: 'instant' }); }, [page]);

  // Apply brass hue
  React.useEffect(() => {
    const h = tweaks.accentHue;
    document.documentElement.style.setProperty('--brass-400', `oklch(0.74 0.10 ${h})`);
    document.documentElement.style.setProperty('--brass-500', `oklch(0.62 0.09 ${h})`);
    document.documentElement.style.setProperty('--brass-600', `oklch(0.52 0.08 ${h})`);
    document.documentElement.style.setProperty('--brass-100', `oklch(0.93 0.04 ${h})`);
  }, [tweaks.accentHue]);

  // Optional deeper/darker cream mode
  React.useEffect(() => {
    if (tweaks.deepMode) {
      document.documentElement.style.setProperty('--bg-cream', '#EEE7D5');
      document.documentElement.style.setProperty('--bg-paper', '#F5EFDF');
    } else {
      document.documentElement.style.setProperty('--bg-cream', '#F5F0E6');
      document.documentElement.style.setProperty('--bg-paper', '#FBF7ED');
    }
  }, [tweaks.deepMode]);

  const pages = {
    home: <HomePage setPage={setPage} />,
    commercial: <CommercialPage setPage={setPage} />,
    residential: <ResidentialPage setPage={setPage} />,
    anthology: <AnthologyPage setPage={setPage} />,
    technical: <TechnicalPage setPage={setPage} />,
    studio: <StudioPage setPage={setPage} />,
  };

  return (
    <>
      <Header page={page} setPage={setPage} dense={tweaks.denseHeader} />
      <main key={page} data-screen-label={page}>
        {pages[page]}
      </main>
      <Footer setPage={setPage} />

      <TweaksPanel title="Tweaks">
        <TweakSection label="Accent tone" />
        <TweakSlider label="Brass hue" value={tweaks.accentHue} min={20} max={80} step={1} unit="°" onChange={v => setTweak('accentHue', v)} />
        <TweakSection label="Surface" />
        <TweakToggle label="Warmer cream" value={tweaks.deepMode} onChange={v => setTweak('deepMode', v)} />
        <TweakSection label="Chrome" />
        <TweakToggle label="Dense header" value={tweaks.denseHeader} onChange={v => setTweak('denseHeader', v)} />
      </TweaksPanel>
    </>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
